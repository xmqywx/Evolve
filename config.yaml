agent:
  name: "MyAgent"
  data_dir: "/Users/ying/Documents/MyAgent"
  db_path: "/Users/ying/Documents/MyAgent/agent.db"

claude:
  binary: "claude"
  default_cwd: "/Users/ying/Documents"
  timeout: 600
  args:
    - "--dangerously-skip-permissions"
    - "--output-format"
    - "stream-json"

scheduler:
  max_daily_calls: 50
  min_interval_seconds: 30

server:
  host: "0.0.0.0"
  port: 8090
  secret: "change-me-to-a-real-secret"

feishu:
  app_id: ""
  app_secret: ""
  bot_webhook: ""
  chat_id: ""
  enabled: false

relay:
  url: "ws://wdao.chat:9876/ws"
  token: ""
  reconnect_interval: 5
  enabled: false

doubao:
  api_key: ""
  base_url: "https://ark.cn-beijing.volces.com/api/v3"
  chat_model: "doubao-seed-2-0-pro-260215"
  embedding_model: "doubao-embedding-large-text-240915"
  enabled: false

postgres:
  dsn: "postgresql://ying@localhost/myagent"
  enabled: false
