<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 160" fill="none">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="50%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#0369A1"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="840" height="160" rx="12" fill="#0F172A"/>

  <!-- Pixel grid size: 8px per pixel block, letters ~9 blocks tall -->
  <!-- Y offset: 16px top padding -->
  <!-- X starts at 24px, 8px gap between letters -->

  <!-- ===== E ===== x=24 -->
  <rect x="24" y="16" width="8" height="72" fill="url(#g)"/><!-- left bar -->
  <rect x="32" y="16" width="48" height="8" fill="url(#g)"/><!-- top -->
  <rect x="32" y="48" width="40" height="8" fill="url(#g)"/><!-- mid -->
  <rect x="32" y="80" width="48" height="8" fill="url(#g)"/><!-- bottom -->
  <!-- outline accent -->
  <rect x="24" y="88" width="56" height="8" fill="#0369A1" opacity="0.5"/>
  <rect x="24" y="96" width="56" height="8" fill="#0369A1" opacity="0.3"/>

  <!-- ===== V ===== x=104 -->
  <rect x="104" y="16" width="8" height="56" fill="url(#g)"/><!-- left -->
  <rect x="152" y="16" width="8" height="56" fill="url(#g)"/><!-- right -->
  <rect x="112" y="64" width="8" height="16" fill="url(#g)"/><!-- left-lower -->
  <rect x="144" y="64" width="8" height="16" fill="url(#g)"/><!-- right-lower -->
  <rect x="120" y="72" width="24" height="16" fill="url(#g)"/><!-- bottom point -->
  <!-- shadow -->
  <rect x="112" y="88" width="40" height="8" fill="#0369A1" opacity="0.5"/>
  <rect x="120" y="96" width="24" height="8" fill="#0369A1" opacity="0.3"/>

  <!-- ===== O ===== x=184 -->
  <rect x="192" y="16" width="40" height="8" fill="url(#g)"/><!-- top -->
  <rect x="184" y="24" width="8" height="56" fill="url(#g)"/><!-- left -->
  <rect x="232" y="24" width="8" height="56" fill="url(#g)"/><!-- right -->
  <rect x="192" y="80" width="40" height="8" fill="url(#g)"/><!-- bottom -->
  <!-- shadow -->
  <rect x="184" y="88" width="56" height="8" fill="#0369A1" opacity="0.5"/>
  <rect x="184" y="96" width="56" height="8" fill="#0369A1" opacity="0.3"/>

  <!-- ===== L ===== x=264 -->
  <rect x="264" y="16" width="8" height="72" fill="url(#g)"/><!-- left bar -->
  <rect x="272" y="80" width="48" height="8" fill="url(#g)"/><!-- bottom -->
  <!-- shadow -->
  <rect x="264" y="88" width="56" height="8" fill="#0369A1" opacity="0.5"/>
  <rect x="264" y="96" width="56" height="8" fill="#0369A1" opacity="0.3"/>

  <!-- ===== V ===== x=344 -->
  <rect x="344" y="16" width="8" height="56" fill="url(#g)"/>
  <rect x="392" y="16" width="8" height="56" fill="url(#g)"/>
  <rect x="352" y="64" width="8" height="16" fill="url(#g)"/>
  <rect x="384" y="64" width="8" height="16" fill="url(#g)"/>
  <rect x="360" y="72" width="24" height="16" fill="url(#g)"/>
  <!-- shadow -->
  <rect x="352" y="88" width="40" height="8" fill="#0369A1" opacity="0.5"/>
  <rect x="360" y="96" width="24" height="8" fill="#0369A1" opacity="0.3"/>

  <!-- ===== E ===== x=424 -->
  <rect x="424" y="16" width="8" height="72" fill="url(#g)"/>
  <rect x="432" y="16" width="48" height="8" fill="url(#g)"/>
  <rect x="432" y="48" width="40" height="8" fill="url(#g)"/>
  <rect x="432" y="80" width="48" height="8" fill="url(#g)"/>
  <!-- shadow -->
  <rect x="424" y="88" width="56" height="8" fill="#0369A1" opacity="0.5"/>
  <rect x="424" y="96" width="56" height="8" fill="#0369A1" opacity="0.3"/>

  <!-- Tagline text -->
  <text x="420" y="140" text-anchor="middle" font-family="monospace" font-size="14" fill="#64748B" letter-spacing="4">
    AI AGENT CONTROL PLANE
  </text>
</svg>
