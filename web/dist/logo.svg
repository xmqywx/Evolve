<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 120" fill="none">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="45%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#0284C7"/>
    </linearGradient>
    <linearGradient id="s" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0284C7" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0284C7" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="720" height="120" rx="8" fill="#0F172A"/>

  <!-- p=10 pixel size, each letter on a 6x9 grid, gap=2p between letters -->
  <!-- Y: top=10, letter height=90 -->
  <!-- Shadow layer (offset +10 down, darker) rendered first -->

  <!-- ====== SHADOW LAYER ====== -->
  <!-- E shadow -->
  <rect x="30" y="20" width="10" height="90" fill="url(#s)"/>
  <rect x="40" y="20" width="50" height="10" fill="url(#s)"/>
  <rect x="40" y="55" width="40" height="10" fill="url(#s)"/>
  <rect x="40" y="90" width="50" height="10" fill="url(#s)"/>

  <!-- V shadow -->
  <rect x="110" y="20" width="10" height="60" fill="url(#s)"/>
  <rect x="160" y="20" width="10" height="60" fill="url(#s)"/>
  <rect x="120" y="70" width="10" height="20" fill="url(#s)"/>
  <rect x="150" y="70" width="10" height="20" fill="url(#s)"/>
  <rect x="130" y="80" width="20" height="20" fill="url(#s)"/>

  <!-- O shadow -->
  <rect x="200" y="20" width="10" height="80" fill="url(#s)"/>
  <rect x="260" y="20" width="10" height="80" fill="url(#s)"/>
  <rect x="210" y="20" width="50" height="10" fill="url(#s)"/>
  <rect x="210" y="90" width="50" height="10" fill="url(#s)"/>

  <!-- L shadow -->
  <rect x="300" y="20" width="10" height="80" fill="url(#s)"/>
  <rect x="310" y="90" width="50" height="10" fill="url(#s)"/>

  <!-- V shadow -->
  <rect x="390" y="20" width="10" height="60" fill="url(#s)"/>
  <rect x="440" y="20" width="10" height="60" fill="url(#s)"/>
  <rect x="400" y="70" width="10" height="20" fill="url(#s)"/>
  <rect x="430" y="70" width="10" height="20" fill="url(#s)"/>
  <rect x="410" y="80" width="20" height="20" fill="url(#s)"/>

  <!-- E shadow -->
  <rect x="480" y="20" width="10" height="90" fill="url(#s)"/>
  <rect x="490" y="20" width="50" height="10" fill="url(#s)"/>
  <rect x="490" y="55" width="40" height="10" fill="url(#s)"/>
  <rect x="490" y="90" width="50" height="10" fill="url(#s)"/>

  <!-- ====== MAIN LETTER LAYER ====== -->
  <!-- E -->
  <rect x="30" y="10" width="10" height="90" fill="url(#g)"/>
  <rect x="40" y="10" width="50" height="10" fill="url(#g)"/>
  <rect x="40" y="45" width="40" height="10" fill="url(#g)"/>
  <rect x="40" y="80" width="50" height="10" fill="url(#g)"/>

  <!-- V -->
  <rect x="110" y="10" width="10" height="60" fill="url(#g)"/>
  <rect x="160" y="10" width="10" height="60" fill="url(#g)"/>
  <rect x="120" y="60" width="10" height="20" fill="url(#g)"/>
  <rect x="150" y="60" width="10" height="20" fill="url(#g)"/>
  <rect x="130" y="70" width="20" height="20" fill="url(#g)"/>

  <!-- O -->
  <rect x="200" y="10" width="10" height="80" fill="url(#g)"/>
  <rect x="260" y="10" width="10" height="80" fill="url(#g)"/>
  <rect x="210" y="10" width="50" height="10" fill="url(#g)"/>
  <rect x="210" y="80" width="50" height="10" fill="url(#g)"/>

  <!-- L -->
  <rect x="300" y="10" width="10" height="80" fill="url(#g)"/>
  <rect x="310" y="80" width="50" height="10" fill="url(#g)"/>

  <!-- V -->
  <rect x="390" y="10" width="10" height="60" fill="url(#g)"/>
  <rect x="440" y="10" width="10" height="60" fill="url(#g)"/>
  <rect x="400" y="60" width="10" height="20" fill="url(#g)"/>
  <rect x="430" y="60" width="10" height="20" fill="url(#g)"/>
  <rect x="410" y="70" width="20" height="20" fill="url(#g)"/>

  <!-- E -->
  <rect x="480" y="10" width="10" height="90" fill="url(#g)"/>
  <rect x="490" y="10" width="50" height="10" fill="url(#g)"/>
  <rect x="490" y="45" width="40" height="10" fill="url(#g)"/>
  <rect x="490" y="80" width="50" height="10" fill="url(#g)"/>

  <!-- ====== OUTLINE (thin lines on letters) ====== -->
  <rect x="30" y="10" width="60" height="1" fill="#5EEAD4" opacity="0.4"/>
  <rect x="110" y="10" width="60" height="1" fill="#5EEAD4" opacity="0.4"/>
  <rect x="200" y="10" width="70" height="1" fill="#5EEAD4" opacity="0.4"/>
  <rect x="300" y="10" width="10" height="1" fill="#5EEAD4" opacity="0.4"/>
  <rect x="390" y="10" width="60" height="1" fill="#5EEAD4" opacity="0.4"/>
  <rect x="480" y="10" width="60" height="1" fill="#5EEAD4" opacity="0.4"/>

  <!-- Tagline -->
  <text x="600" y="55" font-family="'Courier New',monospace" font-size="11" fill="#64748B" letter-spacing="2">AI AGENT</text>
  <text x="600" y="75" font-family="'Courier New',monospace" font-size="11" fill="#64748B" letter-spacing="2">CONTROL</text>
  <text x="600" y="95" font-family="'Courier New',monospace" font-size="11" fill="#64748B" letter-spacing="2">PLANE</text>
</svg>
