<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MyAgent{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        [hx-indicator] .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline-block; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    <nav class="bg-gray-800 border-b border-gray-700 px-6 py-3">
        <div class="flex items-center justify-between max-w-6xl mx-auto">
            <a href="/" class="text-xl font-bold text-blue-400">MyAgent</a>
            <div class="flex gap-4">
                <a href="/" class="text-gray-300 hover:text-white">控制台</a>
                <a href="/tasks" class="text-gray-300 hover:text-white">任务</a>
                <a href="/memory" class="text-gray-300 hover:text-white">记忆</a>
            </div>
        </div>
    </nav>
    <main class="max-w-6xl mx-auto px-6 py-8">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
