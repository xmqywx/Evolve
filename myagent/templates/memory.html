{% extends "base.html" %}
{% block title %}记忆搜索 - MyAgent{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-2">记忆搜索</h1>
<p class="text-sm text-gray-500 mb-6">搜索 MyAgent 的长期记忆，包括任务总结、决策记录、知识实体</p>

<form hx-get="/web/memory/search" hx-target="#results" hx-swap="innerHTML" class="flex gap-3 mb-6">
    <input type="text" name="q" value="{{ query or '' }}" placeholder="输入关键词搜索..."
           class="flex-1 bg-gray-800 border border-gray-600 rounded-lg px-4 py-2 text-gray-100 focus:border-blue-500 focus:outline-none">
    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-medium">
        搜索
        <span class="htmx-indicator">...</span>
    </button>
</form>

<div id="results">
{% include "_memory_results.html" %}
</div>
{% endblock %}
